name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-dev-arm:3.5-branch
    strategy:
      fail-fast: false
      matrix:
        include:
        - board: nice_nano_v2
          shield: corne_left
        - board: nice_nano_v2
          shield: corne_right
        - board: nice_nano_v2
          shield: settings_reset
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete Previous Cache
        run: |
          rm -rf modules/ tools/ zephyr/ bootloader/ zmk/
        continue-on-error: true

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-west-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: Patch Corne LED chain-length
        run: |
          sed -i 's/chain-length = <10>/chain-length = <27>/' \
            zmk/app/boards/shields/corne/boards/nice_nano_v2.overlay
          echo "Patched overlay:"
          cat zmk/app/boards/shields/corne/boards/nice_nano_v2.overlay

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (${{ matrix.shield }})
        run: west build -s zmk/app -b ${{ matrix.board }} -- -DSHIELD="${{ matrix.shield }}" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename ZMK
        run: |
          BOARD_SAFE=$(echo "${{ matrix.board }}" | tr '/' '-')
          cp build/zephyr/zmk.uf2 ${{ matrix.shield }}-${BOARD_SAFE}-zmk.uf2
          echo "BOARD_SAFE=${BOARD_SAFE}" >> $GITHUB_ENV

      - name: Archive (${{ matrix.shield }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.shield }}-${{ env.BOARD_SAFE }}-zmk-${{ strategy.job-index }}
          path: ${{ matrix.shield }}-*-zmk.uf2
