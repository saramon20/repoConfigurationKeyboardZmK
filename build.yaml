name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    name: Build
    strategy:
      fail-fast: false
    matrix:
        include:
          # Lado Izquierdo
          - board: nice_nano/nrf52840
            shield: corne_left
            
          # Lado Derecho
          - board: nice_nano/nrf52840
            shield: corne_right
            
          # Reset
          - board: nice_nano/nrf52840
            shield: settings_reset
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-west-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (${{ matrix.shield }})
        run: west build -s zmk/app -b ${{ matrix.board }} -- -DSHIELD="${{ matrix.shield }}" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename ZMK
        run: cp build/zephyr/zmk.uf2 ${{ matrix.shield }}-${{ matrix.board }}-zmk.uf2

      - name: Archive (${{ matrix.shield }})
        uses: actions/upload-artifact@v4
        with:
          # AQUI ESTA EL TRUCO: Agregamos un ID unico para evitar conflictos
          name: ${{ matrix.shield }}-${{ matrix.board }}-zmk-${{ strategy.job-index }}
          path: ${{ matrix.shield }}-${{ matrix.board }}-zmk.uf2
